name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Run Build inside Project Folder
      run: |
        # Hum direct us folder ke andar ja rahe hain jo aapne upload kiya hai
        cd Vibecut-*/ 2>/dev/null || cd vibecut-*/ 2>/dev/null || cd *workspace*/ 2>/dev/null || cd *
        
        echo "Current folder path: \$(pwd)"
        
        # Sabhi cheezein ek hi terminal flow mein run hogi
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npm run build
        
        npx cap init "VibeCut Workspace" "com.vibecut.app" --web-dir=dist
        npx cap add android
        npx cap sync android
        
        # Java environment set karke yahin se build karenge
        export JAVA_HOME=\$JAVA_HOME_17_X64
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VibeCut-Android-APK
        path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
