name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Find Project and Run Build
      run: |
        # Yeh line khud dhoondhegi ki package.json kahan hai
        TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
        echo "Project folder found at: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Sabhi packages install aur build karein
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npm run build
        
        # Capacitor setup
        npx cap init "VibeCut Workspace" "com.vibecut.app" --web-dir=dist
        npx cap add android
        npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Debug APK
      run: |
        TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
        cd "$TARGET_DIR/android"
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VibeCut-Android-APK
        path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
