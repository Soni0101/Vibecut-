name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install and Build App
      run: |
        # Safely find the folder containing package.json without any wildcard confusion
        TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
        echo "Entering project directory: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Install packages
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # Build the web assets
        npm run build
        
        # Initialize Capacitor safely
        npx cap init "VibeCut Workspace" "com.vibecut.app" --web-dir=dist || true
        
        # Check if android folder already exists, if not, add it
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        
        # Sync assets to android folder
        npx cap sync android
        
        # Compile the final APK
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VibeCut-Android-APK
        path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
