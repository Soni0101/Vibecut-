name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install and Build App
      run: |
        # Sub-folder ke andar jaane ke liye bilkul direct rasta
        cd Vibecut-*/ 2>/dev/null || cd vibecut-*/ 2>/dev/null || cd *workspace*/ 2>/dev/null || cd *
        
        # Ek-ek karke simple commands run honge
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npm run build
        
        npx cap init "VibeCut Workspace" "com.vibecut.app" --web-dir=dist
        npx cap add android
        npx cap sync android
        
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VibeCut-Android-APK
        path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
