name: Build Android APK From Uploaded Zip

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Unzip Project and Build APK
      run: |
        # 1. Zip file ko extract karein
        echo "Extracting vibecut-workspace.zip..."
        unzip vibecut-workspace.zip -d extracted_project
        
        # 2. Extracted folder ke andar package.json dhoondhein
        TARGET_DIR=$(find ./extracted_project -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
        
        if [ -z "$TARGET_DIR" ]; then
          echo "Error: Zip file ke andar package.json nahi mili!"
          exit 1
        fi
        
        echo "Project folder mil gaya: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # 3. Web assets aur dependencies taiyar karein
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npm run build
        
        npx cap init "VibeCut Workspace" "com.vibecut.app" --web-dir=dist || true
        
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        
        npx cap sync android
        
        cd android
        
        # 4. Root aur App dono build.gradle mein duplicate classes ko override karein
        gradle_fix="configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22' } }"
        echo "$gradle_fix" >> build.gradle
        echo "$gradle_fix" >> app/build.gradle
        
        # 5. Gradle properties mein duplicate files ignore karne ki settings dalein
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        
        # 6. Final Build chalu karein
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VibeCut-Android-APK
        path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
